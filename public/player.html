<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Video Player</title>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
      font-family: sans-serif;
    }
    video {
      max-width: 90%;
      max-height: 90%;
      border: 1px solid #333;
    }
  </style>
</head>
<body>
  <video id="vid" src="live-demo sample.mp4" autoplay muted controls></video>
  <script>
    const v = document.getElementById('vid');
    v.play().catch(e => {
      console.log("Autoplay blocked, adding click listener", e);
      document.body.addEventListener('click', () => v.play());
    });
  </script>
</body>
</html>
